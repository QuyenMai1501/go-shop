name: CI

# Chạy ở MỌI pull request và mọi lần push lên main
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4          # tải code về runner

      - uses: actions/setup-go@v5          # cài Go trên runner
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Kiểm tra lỗi tĩnh
        run: go vet ./...

      - name: Chạy unit test
        run: go test -v ./...

      - name: Build thử
        run: go build -o /dev/null .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cài dependency (npm ci nhanh & tái lập được, dùng cho CI)
        run: npm ci

      - name: Build thử
        run: npm run build